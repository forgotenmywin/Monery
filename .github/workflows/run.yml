name: Click Test (Manual)

on:
  workflow_dispatch:  # فقط دستی

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          chromium-browser --version

      - name: Install Python dependencies
        run: |
          pip install selenium pillow requests

      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-dejavu

      - name: Get current time
        id: time
        run: echo "time=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Run script
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          WEBSHARE_API_KEY: ${{ secrets.WEBSHARE_API_KEY }}  # اضافه شد
        run: python main.py

      - name: Upload to Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: click-test-${{ steps.time.outputs.time }}
          path: |
            *.png
            *.txt
          retention-days: 7

      - name: Commit and push files
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add whroted.txt used_proxies.txt used_passwords.txt 2>/dev/null || true

          if ! git diff --staged --quiet; then
            git commit -m "Update used files [skip ci]"
            git push
            echo "✅ Files pushed"
          else
            echo "ℹ️ No changes"
          fi
